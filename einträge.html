<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einträge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="ButtonE" onclick="window.location.href='index.html'">Zum Formular</button>

    <div id="Karten">

    </div>

    <button class="ButtonE" id="snd" onclick="window.location.href='index.html'">Zum Formular</button>


    <script>
        const Karten = document.getElementById("Karten")

        for (let i = 0; i < localStorage.length; i++) {

            const Formular = localStorage.key(i);



            const daten = JSON.parse(localStorage.getItem(Formular));
            const card = document.createElement("div");
            const delBtn = document.createElement("buttonE")
            delBtn.classList = "ButtonE","delBtn"
            delBtn.textContent = "Formular löschen"
            delBtn.addEventListener("click", () => {
                card.remove();
                localStorage.removeItem(Formular)
            })
            card.className = "Card"

            for (const entry of Object.entries(daten)) {
                const p = document.createElement("li");
                p.textContent = entry[1];
                card.appendChild(p);
                
            }

            Karten.appendChild(card);
            card.appendChild(delBtn)
        }

        const delAll = document.createElement("button")
        delAll.className = "ButtonE"
        delAll.textContent = "Alles Löschen"
        Karten.appendChild(delAll)
        delAll.addEventListener("click",() => {
            localStorage.clear();
            Karten.remove()

        })
       

       

    
    </script>
</body>

</html>
